<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Doação de sangue</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="titulo">

        <h2>Formulário de Doação de Sangue</h2>

    </div>

    <div class="subtitulo">

        <img class="img_subtitulo" src="assets/5842688-removebg-preview.png" alt="">

        <div class="text_subtitulo">
            <h2>Doe sangue!</h2>
            <h3>Complete o formulário abaixo para se tornar um(a) doador(a)!</h3>
        </div>

        <img class="img_subtitulo" src="assets/5842688-removebg-preview.png" alt="">

    </div>

    <main>
        <div class="formulario">

            <form id="FormularioDoacao" method="" action="">

                <label for="nome"> </label>
                <input type="text" id="nome" placeholder="Nome">

                <br><br>

                <label for="email"> </label>
                <input type="email" id="email" placeholder="Email">

                <br><br>

                <label for="idade"></label>
                <input type="number" id="idade" placeholder="Idade">

                <br><br>

                <label for="peso"></label>
                <input type="number" id="peso" placeholder="ex:50kg">

                <br><br>

                <select name="tipo_sangue" id="tipo_sangue">

                    <option value="">Tipo sanguíneo</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="Rh+">Rh+</option>
                    <option value="Rh-">Rh-</option>

                </select>

                <br><br>

                <label for="telefone"> </label>
                <input type="text" id="telefone" placeholder="Telefone">

                <br><br>

                <label for="cidade"> </label>
                <input type="text" id="cidade" placeholder="Cidade">

                <br><br>

                <label for="estado"> </label>
                <input type="text" id="estado" placeholder="Estado">

                <br>
                <br>

                <button type="submit">Enviar AQUI!</button>

            </form>

        </div>
    </main>

    <div class="final">

        <h3 id="resultado"></h3>

    </div>

    <footer class="footer">
        <p>&copy; 2026 doação de Sangue. Todos os direitos reservados.</p>
        <img id="gif" src="assets/blood-letting-blood-donation.gif" alt="gif">
    </footer>
    <script src="script.js"></script>

</body>

</html>
